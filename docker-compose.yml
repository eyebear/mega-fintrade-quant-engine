services:
  quant-engine-tests:
    container_name: mega-fintrade-quant-engine-tests
    build:
      context: .
      dockerfile: Dockerfile
    image: mega-fintrade-quant-engine:latest
    command: ["python", "-m", "pytest"]
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports

  quant-engine-pipeline:
    container_name: mega-fintrade-quant-engine-pipeline
    build:
      context: .
      dockerfile: Dockerfile
    image: mega-fintrade-quant-engine:latest
    command: ["python", "-m", "src.run_pipeline"]
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports